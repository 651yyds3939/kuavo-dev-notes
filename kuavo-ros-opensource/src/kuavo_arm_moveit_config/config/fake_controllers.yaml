controller_list:
  - name: fake_left_arm_controller
    type: $(arg fake_execution_type)
    joints:
      - zarm_l1_joint
      - zarm_l2_joint
      - zarm_l3_joint
      - zarm_l4_joint
      - zarm_l5_joint
      - zarm_l6_joint
      - zarm_l7_joint
  - name: fake_right_arm_controller
    type: $(arg fake_execution_type)
    joints:
      - zarm_r1_joint
      - zarm_r2_joint
      - zarm_r3_joint
      - zarm_r4_joint
      - zarm_r5_joint
      - zarm_r6_joint
      - zarm_r7_joint
initial:  # Define initial robot poses per group
  - group: left_arm
    pose: left_ready
  - group: right_arm
    pose: right_ready